services:
  coturn:
    image: coturn/coturn:4.6
    container_name: coturn
    restart: unless-stopped
    network_mode: host
    command:
      - -n
      - --log-file=stdout
      - --fingerprint
      - --lt-cred-mech
      - --realm=chat-app
      - --user=turnuser:turnpass
      - --listening-port=3478
      - --min-port=49152
      - --max-port=65535
    # With `network_mode: host`, ports are exposed directly on the host.
    # You still must open firewall ports on the machine.

